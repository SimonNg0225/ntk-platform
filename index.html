<!doctype html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>貨櫃 PO 匯入工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{ --accent:#4f46e5; --accent-d:#3730a3; --bg:#f4f7fb; --ink:#1e293b; --muted:#64748b; --border:#e2e8f0; --ok:#047857; --okbg:#ecfdf5; --warn:#b45309; --warnbg:#fffbeb; --err:#be123c; --errbg:#fff1f2; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter','Noto Sans HK',system-ui,-apple-system,'PingFang HK','Microsoft JhengHei','Segoe UI',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5;padding:28px 16px;}
  .wrap{max-width:760px;margin:0 auto;}
  h1{font-size:24px;font-weight:600;letter-spacing:-0.02em;display:flex;align-items:center;gap:10px;}
  h1 .ic{width:38px;height:38px;border-radius:11px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;}
  .sub{color:var(--muted);font-size:14px;margin:6px 0 22px;}
  .card{background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:0 1px 2px rgba(15,23,42,.04);padding:18px 18px;margin-bottom:14px;}
  .step{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
  label.file{display:block;border:1.5px dashed var(--border);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:.15s;background:#fafbfd;}
  label.file:hover{border-color:var(--accent);background:#f5f7ff;}
  label.file.has{border-style:solid;border-color:var(--accent);background:#f5f7ff;}
  label.file .big{font-weight:600;font-size:14px;}
  label.file .hint{font-size:12px;color:var(--muted);margin-top:3px;}
  input[type=file]{display:none;}
  .or{text-align:center;font-size:12px;font-weight:600;color:var(--muted);margin:11px 0;}
  #container{width:100%;margin-top:10px;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font:inherit;font-size:13px;}
  #container:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,70,229,.15);}
  .go{width:100%;border:none;background:var(--accent);color:#fff;font:inherit;font-weight:600;font-size:15px;padding:13px;border-radius:12px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
  .go:hover:not(:disabled){background:var(--accent-d);}
  .go:active:not(:disabled){transform:scale(.99);}
  .go:disabled{opacity:.45;cursor:not-allowed;}
  .log{font-size:13px;white-space:pre-wrap;color:var(--muted);margin-top:10px;font-family:ui-monospace,Menlo,monospace;}
  table{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px;}
  th,td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--border);}
  th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
  .badge{display:inline-block;padding:2px 8px;border-radius:7px;font-size:11px;font-weight:600;}
  .b-ok{background:var(--okbg);color:var(--ok);} .b-warn{background:var(--warnbg);color:var(--warn);} .b-err{background:var(--errbg);color:var(--err);}
  .note{font-size:12px;color:var(--muted);background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-top:6px;}
  .spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;}
  @keyframes sp{to{transform:rotate(360deg);}}
  a.dl{display:inline-flex;align-items:center;gap:6px;margin-top:10px;background:var(--okbg);color:var(--ok);font-weight:600;padding:10px 14px;border-radius:10px;text-decoration:none;font-size:14px;}
</style>
</head>
<body>
<div class="wrap">
  <h1><span class="ic">📦</span> 貨櫃 PO 匯入工具</h1>
  <p class="sub">由貨櫃資料夾各份 PO 嘅「X PO Masterlist」抽資料 → 按資料夾名搵對應工作表 → append 落主檔。全程喺你部瀏覽器，<b>唔會上載任何嘢</b>，原主檔唔變（會下載新檔）。</p>

  <div class="card">
    <div class="step">① 主 Excel</div>
    <label class="file" id="lblMaster">
      <input type="file" id="master" accept=".xlsx,.xlsm" />
      <div class="big" id="masterTxt">揀主檔 ContainerPOMasterList…</div>
      <div class="hint">.xlsx — 入面 141 個貨櫃工作表嗰個</div>
    </label>
  </div>

  <div class="card">
    <div class="step">② 貨櫃 PO — 揀資料夾 或 單檔</div>
    <label class="file" id="lblFolder">
      <input type="file" id="folder" webkitdirectory directory multiple />
      <div class="big" id="folderTxt">📁 揀貨櫃資料夾 或 母資料夾…</div>
      <div class="hint">資料夾名 = 工作表名,自動對應(單一貨櫃夾或母夾都得)</div>
    </label>
    <div class="or">— 或 —</div>
    <label class="file" id="lblFiles">
      <input type="file" id="files" accept=".xlsx,.xlsm" multiple />
      <div class="big" id="filesTxt">📄 直接揀一個或多個 PO 檔案…</div>
      <div class="hint">冇放喺資料夾嘅 PO;揀檔後喺下面填目標貨櫃</div>
    </label>
    <input type="text" id="container" list="sheetList" placeholder="目標貨櫃工作表名（揀檔模式先要填,例 UK 40ft DG - BMOU5344675）" autocomplete="off" />
    <datalist id="sheetList"></datalist>
  </div>

  <div class="card">
    <button class="go" id="run" disabled>開始處理並下載更新主檔</button>
    <div class="note">配對規則：<b>資料夾名 = 工作表名</b>（自動去空格、不分大小寫）。欄位<b>按表頭名</b>對應，有就入、冇就留空，新行繼承格式。寫入係 append 落該表現有資料之後。</div>
    <div class="log" id="log"></div>
    <div id="result"></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id)
const log = (m) => { $('log').textContent += m + '\n' }
const VALID_OP = new Set(['equal','notBetween','endsWith','notEqual','between','notContains','lessThan','beginsWith','containsText','greaterThan','greaterThanOrEqual','lessThanOrEqual'])

// ── 表頭正規化：只取英文字母，去中文/符號/換行 ──
const norm = (v) => String(cellText(v) ?? '').replace(/[^A-Za-z]/g, '').toLowerCase()
// 工作表名正規化：trim + 收空格 + 大寫
const normSheet = (s) => String(s || '').trim().replace(/\s+/g, ' ').toUpperCase()

function cellText(v) {
  if (v == null) return ''
  if (typeof v === 'object') {
    if (v.richText) return v.richText.map((r) => r.text).join('')
    if (v.text != null) return String(v.text)
    if (v.result != null) return String(v.result)
    if (v instanceof Date) return v
    return ''
  }
  return v
}
// 抽「安全結果值」：只放行 字串/有限數字/有效日期/布林；公式取 result，error/NaN/無效日期/控制字元 → 當空
function literalValue(cell) {
  const v = cell.value; let r
  if (v != null && typeof v === 'object' && !(v instanceof Date)) {
    if ('result' in v) r = v.result
    else if (v.richText) r = v.richText.map((t) => t.text).join('')
    else if ('text' in v) r = v.text
    else r = undefined
  } else r = v
  // 公式無 result / error 物件 / null → 用 ExcelJS 計到嘅顯示文字補返（日期/數字唔受影響）
  if (r == null || (typeof r === 'object' && !(r instanceof Date))) {
    let t = ''; try { t = cell.text == null ? '' : String(cell.text) } catch (e) {}
    r = t
  }
  if (typeof r === 'number') return Number.isFinite(r) ? r : null
  if (r instanceof Date) return isNaN(r.getTime()) ? null : r
  if (typeof r === 'boolean') return r
  if (r == null) return null
  const s = String(r).replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g, '')
  return s === '' ? null : s
}
function isEmpty(v) { const t = cellText(v); return t === '' || t == null }
// 清理值（補 SheetJS 來嘅）：NaN/無效日期/控制字元/空 → null
function cleanVal(v) {
  if (v == null) return null
  if (typeof v === 'number') return Number.isFinite(v) ? v : null
  if (v instanceof Date) return isNaN(v.getTime()) ? null : v
  if (typeof v === 'boolean') return v
  const s = String(v).replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g, '')
  return s === '' ? null : s
}
// 欄位中文名（處理報告用）
const FIELD_LABEL = { sequenceauto: '序號', supplier: '供應商', buyer: '採購', invoice: '發票#', brandproduct: '品牌及產品', bestbeforedate: '此日期前最佳', qty: '數量', unit: '單位', barcode: '條碼', packingdescriptionoptional: '包裝描述' }
function csvCell(v) { const s = v == null ? '' : String(v); return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s }

// 修正 ExcelJS 寫出時整壞嘅 conditional formatting（已驗證）
function fixCF(xml) {
  xml = xml.replace(/ operator="([^"]*)"/g, (m, op) => (VALID_OP.has(op) ? m : ''))
  xml = xml.replace(/(<cfRule\b(?:(?!operator=)[^>])*?type="containsText")((?:(?!operator=)[^>])*?>)/g, '$1 operator="containsText"$2')
  return xml
}

let masterFile = null
let folderFiles = [] // {container, name, file}
let singleFiles = [] // File[]（單檔模式）

$('master').addEventListener('change', async (e) => {
  masterFile = e.target.files[0] || null
  $('masterTxt').textContent = masterFile ? '✓ ' + masterFile.name : '揀主檔 ContainerPOMasterList…'
  $('lblMaster').classList.toggle('has', !!masterFile)
  refresh()
  if (masterFile) {
    const names = await readSheetNames(masterFile)
    $('sheetList').innerHTML = names.map((n) => `<option value="${esc(n)}"></option>`).join('')
  }
})
$('folder').addEventListener('change', (e) => {
  const files = [...e.target.files].filter((f) => /\.(xlsx|xlsm)$/i.test(f.name) && !f.name.startsWith('~$'))
  folderFiles = files.map((f) => {
    const segs = (f.webkitRelativePath || f.name).split('/')
    return { container: segs.length >= 2 ? segs[segs.length - 2] : '', name: f.name, file: f }
  }).filter((x) => x.container)
  const containers = [...new Set(folderFiles.map((x) => x.container))]
  $('folderTxt').textContent = folderFiles.length ? `✓ ${containers.length} 個貨櫃、${folderFiles.length} 份 PO` : '📁 揀貨櫃資料夾 或 母資料夾…'
  $('lblFolder').classList.toggle('has', !!folderFiles.length)
  refresh()
})
$('files').addEventListener('change', (e) => {
  singleFiles = [...e.target.files].filter((f) => /\.(xlsx|xlsm)$/i.test(f.name) && !f.name.startsWith('~$'))
  $('filesTxt').textContent = singleFiles.length ? `✓ ${singleFiles.length} 份 PO` : '📄 直接揀一個或多個 PO 檔案…'
  $('lblFiles').classList.toggle('has', !!singleFiles.length)
  refresh()
})
$('container').addEventListener('input', refresh)

// 只解壓 workbook.xml 攞 sheet 名（畀單檔模式自動完成；唔使 load 成個 8MB）
async function readSheetNames(file) {
  try {
    const u8 = new Uint8Array(await file.arrayBuffer())
    const zip = fflate.unzipSync(u8, { filter: (f) => f.name === 'xl/workbook.xml' })
    const xml = fflate.strFromU8(zip['xl/workbook.xml'])
    return [...xml.matchAll(/<sheet[^>]*name="([^"]*)"/g)].map((m) =>
      m[1].replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"'),
    )
  } catch (e) { return [] }
}
function refresh() {
  const hasFolder = folderFiles.length > 0
  const hasSingle = singleFiles.length > 0 && $('container').value.trim()
  $('run').disabled = !(masterFile && (hasFolder || hasSingle))
}

$('run').addEventListener('click', async () => {
  $('run').disabled = true
  $('run').innerHTML = '<span class="spin"></span> 處理緊…'
  $('log').textContent = ''; $('result').innerHTML = ''
  try { await process() }
  catch (err) { log('✗ 出錯：' + (err && err.message ? err.message : err)); console.error(err) }
  $('run').disabled = false
  $('run').textContent = '開始處理並下載更新主檔'
})

// 讀一份來源 PO 的 X PO Masterlist → {headers:{normKey:col}, rows:[{normKey:value}]}
// Hybrid 讀來源：ExcelJS 做主（日期/數字準）；ExcelJS 攞唔到值先用 SheetJS 補（救公式文字如 indefinite）
async function readSource(file) {
  const buf = await file.arrayBuffer()
  const ewb = new ExcelJS.Workbook()
  await ewb.xlsx.load(buf)
  let ews = ewb.getWorksheet('X PO Masterlist') || ewb.worksheets.find((w) => norm(w.name).includes('pomasterlist'))
  if (!ews) return { rows: [] }
  let sws = null
  try {
    const swb = XLSX.read(buf, { type: 'array', cellDates: true })
    const sname = swb.SheetNames.find((n) => n === 'X PO Masterlist') || swb.SheetNames.find((n) => norm(n).includes('pomasterlist'))
    sws = sname ? swb.Sheets[sname] : null
  } catch (e) {}
  const map = {}
  ews.getRow(1).eachCell({ includeEmpty: false }, (c, col) => { const k = norm(c.value); if (k && !(k in map)) map[k] = col })
  const rows = []
  const recovered = [] // {row, field, value}：ExcelJS 讀唔到、靠 SheetJS 補返
  for (let r = 2; r <= ews.rowCount; r++) {
    const obj = {}; let any = false
    for (const [k, col] of Object.entries(map)) {
      let v = literalValue(ews.getCell(r, col))
      if (v == null && sws) {
        const cell = sws[XLSX.utils.encode_cell({ r: r - 1, c: col - 1 })]
        let sv = null
        if (cell) sv = (cell.t === 'd' || cell.v instanceof Date) ? (cell.w != null ? cell.w : cell.v) : cell.v
        v = cleanVal(sv)
        if (v != null) recovered.push({ row: r, field: k, value: v })
      }
      if (!isEmpty(v)) any = true
      obj[k] = v
    }
    if (any) rows.push(obj)
  }
  return { rows, recovered }
}

async function process() {
  log('讀緊主檔…（8MB 大檔，約 5-10 秒）')
  const mwb = new ExcelJS.Workbook()
  await mwb.xlsx.load(await masterFile.arrayBuffer())
  log(`主檔 OK：${mwb.worksheets.length} 個工作表`)

  // 正規化 sheet 名 → worksheet
  const sheetByNorm = {}
  mwb.worksheets.forEach((ws) => { sheetByNorm[normSheet(ws.name)] = ws })

  // 按貨櫃 group：① 資料夾（自動讀夾名）② 單檔（用下面填嘅貨櫃名）
  const byContainer = {}
  folderFiles.forEach((x) => { (byContainer[x.container] ||= []).push(x) })
  const cName = $('container').value.trim()
  if (singleFiles.length && cName) {
    singleFiles.forEach((f) => { (byContainer[cName] ||= []).push({ container: cName, name: f.name, file: f }) })
  }

  const results = []
  const allRecovered = [] // {container, file, row, field, value}
  for (const [container, items] of Object.entries(byContainer)) {
    const ws = sheetByNorm[normSheet(container)]
    if (!ws) { results.push({ container, sheet: '—', rows: 0, po: items.length, recov: 0, status: 'err', msg: '搵唔到對應工作表' }); log(`⚠ ${container}：搵唔到對應工作表，跳過`); continue }

    // 主檔表頭（第 2 行）→ {normKey:col}
    const mMap = {}
    ws.getRow(2).eachCell({ includeEmpty: false }, (c, col) => { const k = norm(c.value); if (k && !(k in mMap)) mMap[k] = col })
    const supCol = mMap.supplier || 2

    // 揾最後一行有資料（睇供應商欄）
    let lastRow = 2
    for (let r = 3; r <= ws.rowCount; r++) {
      if (!isEmpty(literalValue(ws.getCell(r, supCol)))) lastRow = r
    }

    let added = 0, recov = 0, wr = lastRow + 1
    for (const it of items.sort((a, b) => a.name.localeCompare(b.name))) {
      const { rows, recovered } = await readSource(it.file)
      for (const sr of rows) {
        // 只填資料欄；序號欄(Auto 公式)同預鋪格式都唔郁
        for (const [k, col] of Object.entries(mMap)) {
          if (k === 'sequenceauto') continue
          if (k in sr && !isEmpty(sr[k])) ws.getCell(wr, col).value = sr[k]
        }
        wr++; added++
      }
      for (const rc of (recovered || [])) { allRecovered.push({ container, file: it.name, row: rc.row, field: rc.field, value: rc.value }); recov++ }
    }
    results.push({ container, sheet: ws.name, rows: added, po: items.length, recov, status: 'ok', msg: `${items.length} 份 PO` })
    log(`✓ ${container} → 「${ws.name}」：+${added} 行${recov ? `，後備救返 ${recov} 格` : ''}`)
  }

  // 寫出 + 修 CF
  log('寫緊更新主檔 + 修正格式…')
  const buf = await mwb.xlsx.writeBuffer()
  const zip = fflate.unzipSync(new Uint8Array(buf))
  for (const name of Object.keys(zip)) {
    if (/^xl\/worksheets\/sheet\d+\.xml$/.test(name)) {
      const xml = fflate.strFromU8(zip[name]); zip[name] = fflate.strToU8(fixCF(xml))
    }
  }
  const out = fflate.zipSync(zip, { level: 6 })
  const blob = new Blob([out], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' })
  const url = URL.createObjectURL(blob)
  const stamp = new Date().toISOString().slice(0, 10)
  const fname = masterFile.name.replace(/\.xlsx$/i, '') + '_更新_' + stamp + '.xlsx'
  const a = document.createElement('a'); a.href = url; a.download = fname; document.body.appendChild(a); a.click(); a.remove()

  // ── 處理報告（畫面 + CSV）──
  const totalRows = results.reduce((s, r) => s + r.rows, 0)
  let csv = '﻿貨櫃,對應工作表,加咗行數,PO數,後備救返,狀態\n'
  results.forEach((r) => { csv += [r.container, r.sheet, r.rows, r.po, r.recov, r.msg].map(csvCell).join(',') + '\n' })
  if (allRecovered.length) {
    csv += '\n後備救返明細（ExcelJS 讀唔到、靠 SheetJS 補返，例如公式型 Indefinite）\n貨櫃,PO檔,來源行,欄位,值\n'
    allRecovered.forEach((x) => { csv += [x.container, x.file, x.row, FIELD_LABEL[x.field] || x.field, x.value].map(csvCell).join(',') + '\n' })
  }
  const csvUrl = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }))
  const csvName = '處理報告_' + stamp + '.csv'

  let html = `<a class="dl" href="${url}" download="${fname}">⬇ 下載更新主檔</a> <a class="dl" href="${csvUrl}" download="${csvName}">⬇ 下載處理報告 CSV</a>`
  html += '<table><thead><tr><th>貨櫃</th><th>對應工作表</th><th>加咗</th><th>PO</th><th>救返</th><th>狀態</th></tr></thead><tbody>'
  for (const r of results) {
    const b = r.status === 'ok' ? 'b-ok' : 'b-err'
    html += `<tr><td>${esc(r.container)}</td><td>${esc(r.sheet)}</td><td>${r.rows}</td><td>${r.po}</td><td>${r.recov || ''}</td><td><span class="badge ${b}">${esc(r.msg)}</span></td></tr>`
  }
  html += '</tbody></table>'
  if (allRecovered.length) {
    html += `<div class="note"><b>🛟 後備救返 ${allRecovered.length} 格</b> —— ExcelJS 讀唔到、靠 SheetJS 補返（例如公式型「Indefinite」）：</div>`
    html += '<table><thead><tr><th>貨櫃</th><th>PO 檔</th><th>行</th><th>欄位</th><th>值</th></tr></thead><tbody>'
    for (const x of allRecovered.slice(0, 50)) {
      html += `<tr><td>${esc(x.container)}</td><td>${esc(x.file)}</td><td>${x.row}</td><td>${esc(FIELD_LABEL[x.field] || x.field)}</td><td>${esc(x.value)}</td></tr>`
    }
    html += '</tbody></table>'
    if (allRecovered.length > 50) html += `<div class="note">（畫面只列前 50 格，完整見 CSV 報告）</div>`
  }
  $('result').innerHTML = html
  log(`完成 ✓ 總共 append ${totalRows} 行${allRecovered.length ? `，後備救返 ${allRecovered.length} 格` : ''}；已下載更新主檔 + 報告。`)
}
function esc(s){return String(s).replace(/[&<>"]/g,(c)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
</script>
</body>
</html>
