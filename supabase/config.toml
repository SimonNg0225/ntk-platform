# Supabase CLI 本地設定。完整選項見 https://supabase.com/docs/guides/cli/config
# project_id 只係本地 CLI 嘅識別名；真正連去邊個雲端 project 係靠
#   supabase link --project-ref <你的 project ref>
project_id = "ntk-platform"

[functions.gemini]
# 由 Supabase 閘道先驗證 JWT，再加 function 內部 getUser，雙重保險。
verify_jwt = true

[functions.calendar-feed]
# 訂閱式 .ics feed：Apple/Google 日曆抓取時唔會帶 Supabase JWT，
# 所以閘道唔可以強制驗 JWT。改用 URL ?token=... 反查 user 做 gate（唯讀）。
verify_jwt = false

[functions.stripe-billing]
# 開 Checkout / 客戶中心：需要登入用戶，閘道先驗 JWT。
verify_jwt = true

[functions.stripe-webhook]
# Stripe 回呼唔會帶 Supabase JWT，改用 Stripe 簽名驗證。
# 部署記得加 --no-verify-jwt。
verify_jwt = false

[functions.team-billing]
# 團隊座位 checkout：需要登入用戶（owner / admin），閘道先驗 JWT。
verify_jwt = true

[functions.support]
# 客服表單：需要登入用戶，閘道先驗 JWT。
verify_jwt = true

[functions.support-admin]
# 客服收件箱（管理員）：閘道驗 JWT，function 內再驗 ADMIN_EMAILS 白名單。
verify_jwt = true
