<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="EziTeach logo — ET monogram with accent">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.5" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#facc15"/>
      <stop offset="1" stop-color="#5eead4"/>
    </linearGradient>
    <clipPath id="round"><rect x="0" y="0" width="512" height="512" rx="112"/></clipPath>
    <filter id="soft" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#0b1220" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g clip-path="url(#round)">
    <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>
    <ellipse cx="120" cy="80" rx="320" ry="220" fill="#ffffff" opacity="0.12"/>
    <circle cx="470" cy="470" r="200" fill="none" stroke="#ffffff" stroke-width="26" opacity="0.07"/>
  </g>

  <g fill="#ffffff" filter="url(#soft)">
    <rect x="104" y="146" width="42" height="200" rx="13"/>
    <rect x="104" y="146" width="122" height="42" rx="13"/>
    <rect x="104" y="232" width="94"  height="42" rx="13"/>
    <rect x="104" y="304" width="122" height="42" rx="13"/>
    <rect x="246" y="146" width="160" height="42" rx="13"/>
    <rect x="305" y="146" width="42"  height="200" rx="13"/>
  </g>

  <!-- accent swoosh 底線（增加活力）-->
  <rect x="104" y="372" width="243" height="20" rx="10" fill="url(#accent)" filter="url(#soft)"/>

  <!-- sparkle -->
  <path d="M410 92 Q410 134 452 134 Q410 134 410 176 Q410 134 368 134 Q410 134 410 92 Z" fill="#facc15"/>
</svg>
